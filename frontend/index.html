<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>PhishGuard</title>

        <link rel="stylesheet" href="style.css" />

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

        <link rel="icon" type="image/x-icon" href="favicon.ico">

        <script defer src="app.js"></script>

        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap"
            rel="stylesheet"
        />
    </head>

    <body>
        <header class="header">
            <div class="logo"> <i class="fa-solid fa-shield-halved"></i> PhishGuard</div>

            <nav id="navTabs" class="hidden">
                <button onclick="showPage('scanner')" class="nav-btn">Scanner</button>

                <button onclick="showPage('dashboard')" class="nav-btn">Dashboard</button>
            </nav>

            <div class="header-actions">
                <button id="themeToggle">☀</button>

                <button id="loginBtn" onclick="openAuth()">Login</button>
            </div>
        </header>

        <main>
            <!-- LANDING -->

            <section id="landing">
                <h1>Detect Phishing Instantly</h1>

                <p>AI powered phishing detection for suspicious URLs and emails.</p>

                <button class="cta" onclick="openAuth()">Start Scanning</button>
            </section>

            <!-- SCANNER -->

            <section id="scanner" class="hidden">
                <h2>Phishing Scanner</h2>

                <div class="scan-box">
                    <div class="scan-tabs">
                        <button onclick="switchScan('url')" class="active">URL</button>

                        <button onclick="switchScan('email')">Email</button>
                    </div>

                    <input
                        id="scanInput"
                        placeholder="Paste suspicious link or email content"
                    />

                    <button class="scan-btn" onclick="fakeScan()">Analyze</button>
                </div>

                <div id="scanResult" class="hidden result-box">
                    <h3>Scan Result</h3>

                    <p id="riskLabel"></p>
                </div>
            </section>

            <!-- DASHBOARD -->

            <section id="dashboard" class="hidden">
                <h2>Security Dashboard</h2>

                <div class="stats">
                    <div class="card">
                        <h3>Total Scans</h3>
                        <p id="totalScans">0</p>
                    </div>

                    <div class="card">
                        <h3>Threats Found</h3>
                        <p id="threats">0</p>
                    </div>

                    <div class="card">
                        <h3>Last 24h</h3>
                        <p id="recent">0</p>
                    </div>
                </div>

                <div class="history">
                    <h3>Scan History</h3>

                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Input</th>
                                <th>Risk</th>
                            </tr>
                        </thead>

                        <tbody id="historyTable"></tbody>
                    </table>
                </div>
            </section>
        </main>

        <!-- AUTH MODAL -->

        <div id="authModal" class="hidden">
            <div class="auth-box">
                <div class="auth-tabs">
                    <button onclick="switchAuth('login')" class="active">Login</button>

                    <button onclick="switchAuth('register')">Register</button>
                </div>

                <!-- LOGIN -->

                <div id="loginForm">
                    <input id="email" placeholder="Email" autocomplete="on"/>

                    <input id="password" placeholder="Password" type="password" />

                    <button class="auth-btn" onclick="login()">Login</button>

                    <div class="google">
                        <button>Sign in with Google</button>
                    </div>
                </div>

                <!-- REGISTER -->

                <div id="registerForm" class="hidden">
                    <input placeholder="First Name" />

                    <input placeholder="Last Name" />

                    <input placeholder="Email" />

                    <input placeholder="Password" type="password" />

                    <input placeholder="Retype Password" type="password" />

                    <label class="checkbox">
                        <input type="checkbox" />
                        Agree to Terms & Privacy Policy
                    </label>

                    <button class="auth-btn">Register</button>
                </div>
            </div>
        </div>
    </body>
</html>
